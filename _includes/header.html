<header class="site-header" style="display: flex; justify-content: center; align-items: center; padding: 1rem;">
  <div class="wrapper" style="width: 100%; max-width: 1200px; margin: 0 auto; text-align: center;">
    {%- assign default_paths = site.pages | map: "path" -%}
    {%- assign page_paths = site.minima.nav_pages | default: default_paths -%}
    {%- assign page_titles = site.pages | map: 'title' | compact -%}

    <a class="site-title" rel="author" href="{{ '/' | relative_url }}" style="text-decoration: none; color: #333; display: block;">
      {{ site.title | escape }}
    </a>

    <!-- Navigation Links -->
    <nav class="site-nav">
      <ul style="list-style: none; padding: 0; display: flex; gap: 1rem; justify-content: center; margin: 0;">
        <li><a href="{{ '/' | relative_url }}" style="text-decoration: none; color: #333;">Home</a></li>
        <li><a href="{{ '/posts/' | relative_url }}" style="text-decoration: none; color: #333;">Post</a></li>
      </ul>
    </nav>
  </div>
</header>
